# Auto-provisioned Grafana datasources. Grafana loads this on startup, so the
# Prometheus + Tempo + Loki connections exist with zero manual clicking.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    isDefault: true
    jsonData:
      httpMethod: POST

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    jsonData:
      # Let trace spans link back to metrics in Prometheus.
      tracesToMetrics:
        datasourceUid: prometheus
      serviceMap:
        datasourceUid: prometheus
      # "Logs for this span" button on every span: query Loki for log lines
      # whose structured-metadata trace_id matches the span's trace.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        customQuery: true
        query: '{service_name=~".+"} | trace_id = "${__span.traceId}"'

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    jsonData:
      # Log lines ingested via OTLP carry trace_id as structured metadata;
      # surface it as a clickable link into the matching Tempo trace.
      derivedFields:
        - name: TraceID
          datasourceUid: tempo
          matcherType: label
          matcherRegex: trace_id
          url: "$${__value.raw}"
          urlDisplayLabel: "View trace"
