# Grafana Loki — single-binary, local log store. Same spirit as tempo.yaml:
# not production-scale, but perfect for a demo. The collector pushes logs to
# Loki's native OTLP ingestion endpoint (/otlp) and Grafana queries :3100.

auth_enabled: false

server:
  http_listen_port: 3100

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-04-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # OTLP-ingested logs carry their attributes (including trace_id / span_id,
  # which link log lines to Tempo traces) as structured metadata.
  allow_structured_metadata: true

compactor:
  working_directory: /loki/compactor
